server:
  port: 8082

spring:
  application:
    name: vehicle-service

  datasource:
    url: jdbc:postgresql://localhost:5433/vehicle_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: vehicle-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "UserRegisteredEvent:com.garage.vehicle.kafka.KafkaEvents$UserRegisteredEvent"

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

kafka:
  topics:
    vehicle-created: vehicle-created
    vehicle-updated: vehicle-updated
    vehicle-deleted: vehicle-deleted
    service-scheduled: service-scheduled
    user-registered: user-registered    # consumed from auth-service
    product-low-stock: product-low-stock  # consumed from stock-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.garage.vehicle: DEBUG
