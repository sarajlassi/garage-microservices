
services:

  # ─────────────────────────────────────
  # PostgreSQL – Auth DB
  # ─────────────────────────────────────
  auth-postgres:
    image: postgres:15-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: authDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    networks:
      - garage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # PostgreSQL – Vehicle DB
  # ─────────────────────────────────────
  vehicle-postgres:
    image: postgres:15-alpine
    container_name: vehicle-postgres
    environment:
      POSTGRES_DB: vehicleDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - vehicle-postgres-data:/var/lib/postgresql/data
    networks:
      - garage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vehicleDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Zookeeper (Kafka dependency)
  # ─────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - garage-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Kafka Broker
  # ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - garage-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────
  # Kafka UI (Monitoring)
  # ─────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - garage-network

  # ─────────────────────────────────────
  # Auth Microservice
  # ─────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      auth-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/authDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    networks:
      - garage-network
    restart: unless-stopped

  # ─────────────────────────────────────
  # Vehicle Microservice
  # ─────────────────────────────────────
  vehicle-service:
    build:
      context: ./vehicle-service
      dockerfile: Dockerfile
    container_name: vehicle-service
    depends_on:
      vehicle-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://vehicle-postgres:5432/vehicle_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    networks:
      - garage-network
    restart: unless-stopped

  # ─────────────────────────────────────
  # PostgreSQL – Stock DB
  # ─────────────────────────────────────
  stock-postgres:
    image: postgres:15-alpine
    container_name: stock-postgres
    environment:
      POSTGRES_DB: stockDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - stock-postgres-data:/var/lib/postgresql/data
    networks:
      - garage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Stock Microservice
  # ─────────────────────────────────────
  stock-service:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
    container_name: stock-service
    depends_on:
      stock-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stock-postgres:5432/stockDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    networks:
      - garage-network
    restart: unless-stopped

volumes:
  auth-postgres-data:
  vehicle-postgres-data:
  stock-postgres-data:

networks:
  garage-network:
    driver: bridge
