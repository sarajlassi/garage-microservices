server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/authDB
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "VehicleCreatedEvent:com.garage.auth.kafka.KafkaEvents$VehicleCreatedEvent,ServiceScheduledEvent:com.garage.auth.kafka.KafkaEvents$ServiceScheduledEvent,InvoicePaidEvent:com.garage.auth.kafka.KafkaEvents$InvoicePaidEvent"

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000   # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms

kafka:
  topics:
    user-registered: user-registered
    user-login: user-login
    token-validated: token-validated
    vehicle-created: vehicle-created
    service-scheduled: service-scheduled
    invoice-paid: invoice-paid

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.garage.auth: DEBUG
    org.springframework.security: INFO
