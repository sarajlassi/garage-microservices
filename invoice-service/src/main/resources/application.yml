server:
  port: 8084

spring:
  application:
    name: invoice-service

  datasource:
    url: jdbc:postgresql://localhost:5435/invoiceDB
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: invoice-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "ServiceScheduledEvent:com.garage.invoice.kafka.KafkaEvents$ServiceScheduledEvent,UserRegisteredEvent:com.garage.invoice.kafka.KafkaEvents$UserRegisteredEvent"

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

kafka:
  topics:
    invoice-created: invoice-created
    invoice-paid: invoice-paid
    service-scheduled: service-scheduled
    user-registered: user-registered

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.garage.invoice: DEBUG
